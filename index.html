<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azure Translator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="wrap">

    <div class="header">
      <div class="header-icon">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 4h8M6 2v2M2 4c0 2.2 1.8 4 4 4m4-4c-.3 2.7-1.5 5-3 6.2M10 4h4M12 2v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 14l4-5M8 14l-5-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1>Translator</h1>
        <p class="subtitle">Microsoft Azure Cognitive Services</p>
      </div>
    </div>

    <!-- API Credentials -->
    <p class="section-label">API Credentials</p>
    <div class="card">
      <div class="field-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        <input type="password" id="key" placeholder="API key">
      </div>
      <div class="field-icon" style="margin-top: 10px;">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M8 2.5C8 2.5 6 5 6 8s2 5.5 2 5.5M8 2.5C8 2.5 10 5 10 8s-2 5.5-2 5.5M2.5 8h11" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        <input type="text" id="region" placeholder="Region (e.g. eastus)">
      </div>
    </div>

    <!-- Languages -->
    <p class="section-label">Languages</p>
    <div class="card">
      <div class="lang-row">
        <div class="lang-select">
          <label>From</label>
          <select id="fromLang">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="fr">French</option>
            <option value="ja">Japanese</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
            <option value="zh">Chinese</option>
            <option value="ar">Arabic</option>
          </select>
        </div>
        <button class="swap-btn" onclick="swapLangs()" title="Swap languages">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M2 5h9M8 2l3 3-3 3M14 11H5M8 8l-3 3 3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="lang-select">
          <label>To</label>
          <select id="toLang">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="ja">Japanese</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
            <option value="zh">Chinese</option>
            <option value="ar">Arabic</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Input -->
    <p class="section-label">Input</p>
    <div class="card">
      <textarea id="textInput" rows="5" placeholder="Enter text to translate…" oninput="updateCount()"></textarea>
      <hr class="divider">
      <div class="input-footer">
        <label class="file-label" for="fileInput">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M9 2H4a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V6L9 2z" stroke="currentColor" stroke-width="1.2"/>
            <path d="M9 2v4h4" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          Attach file
          <input type="file" id="fileInput" onchange="showFile(this)">
        </label>
        <span class="char-count" id="charCount">0 / 5000</span>
      </div>
      <div class="file-name" id="fileName"></div>
    </div>

    <button class="translate-btn" onclick="translateText()">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <path d="M2 4h8M6 2v2M2 4c0 2.2 1.8 4 4 4m4-4c-.3 2.7-1.5 5-3 6.2M10 4h4M12 2v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M8 14l4-5M8 14l-5-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      Translate
    </button>

    <!-- Output -->
    <div class="output-card" id="outputCard">
      <div class="output-header">
        <span class="output-lang" id="outputLang">Translation</span>
        <button class="copy-btn" onclick="copyOutput()">Copy</button>
      </div>
      <div class="output-text" id="output">Your translation will appear here.</div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
